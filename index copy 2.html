        // ─── OTP FUNCTIONS ────────────────────────────────────────────────────
        function getOtpValue() {
            return [0, 1, 2, 3, 4].map(i => {
                const el = document.getElementById('otp' + i);
                return el ? el.value || '' : '';
            }).join('');
        }

        function startOtpTimer() {
            authState.seconds = 60;
            if (authState.timer) clearInterval(authState.timer);
            authState.timer = setInterval(() => {
                authState.seconds--;
                const el = document.getElementById('otpTimer');
                if (el) el.textContent = toPersianNum(authState.seconds);
                if (authState.seconds <= 0) {
                    clearInterval(authState.timer);
                    const txt = document.getElementById('otpTimerText');
                    const btn = document.getElementById('otpResendBtn');
                    if (txt) txt.style.display = 'none';
                    if (btn) btn.style.display = 'inline';
                }
            }, 1000);
        }

        function authResendOtp() {
            api.sendOTP(authState.phone, authState.app);
            const txt = document.getElementById('otpTimerText');
            const btn = document.getElementById('otpResendBtn');
            if (txt) txt.style.display = '';
            if (btn) btn.style.display = 'none';
            startOtpTimer();
            showToast('کد جدید ارسال شد', 'success');
        }

        function otpInput(el, i) {
            el.value = el.value.replace(/[^0-9]/g, '').slice(-1);
            if (el.value && i < 4) {
                const next = document.getElementById('otp' + (i + 1));
                if (next) next.focus();
            }
            if (getOtpValue().length === 5) authVerifyOtp();
        }

        function otpKey(e, i) {
            if (e.key === 'Backspace' && !e.target.value && i > 0) {
                const prev = document.getElementById('otp' + (i - 1));
                if (prev) prev.focus();
            }
        }

        async function authNextPhone() {
            const phoneInput = document.getElementById('phoneInput');
            const phone = phoneInput ? phoneInput.value.trim() : '';
            if (!/^09[0-9]{9}$/.test(phone)) {
                const e = document.getElementById('authError');
                if (e) { e.style.display = 'block';
                    e.textContent = '⚠️ شماره موبایل باید 11 رقم و با 09 شروع شود.'; }
                return;
            }
            authState.phone = phone;
            authState.app = 'telegram';

            try {
                await api.sendOTP(phone, authState.app);
                // Show OTP input
                const modal = document.getElementById('authModal');
                if (modal) {
                    modal.innerHTML = `
                        <div class="modal-header">
                            <div class="modal-header-info">
                                <h2>🔑 کد تایید</h2>
                                <div style="font-size:13px;color:var(--text3);margin-top:4px;">کد ۵ رقمی ارسال شده به ${phone} را وارد کنید</div>
                            </div>
                            <button class="modal-close" onclick="closeAuth()">✕</button>
                        </div>
                        <div class="modal-body" style="padding:24px;">
                            <div class="otp-inputs">
                                ${[0,1,2,3,4].map(i => `
                                    <input class="otp-input" id="otp${i}" type="text" maxlength="1" inputmode="numeric"
                                        oninput="otpInput(this, ${i})" onkeydown="otpKey(event, ${i})" autofocus="${i===0}">
                                `).join('')}
                            </div>
                            <div class="otp-resend">
                                <span id="otpTimerText">⏳ ارسال مجدد کد پس از <span id="otpTimer">${toPersianNum(60)}</span> ثانیه</span>
                                <button id="otpResendBtn" style="display:none" onclick="authResendOtp()">ارسال مجدد کد</button>
                            </div>
                            <div class="field-error" id="otpError" style="display:none"></div>
                            <div style="text-align:center;margin-top:8px;">
                                <button class="btn-primary" style="width:100%" onclick="authVerifyOtp()">تأیید و ورود</button>
                            </div>
                        </div>
                    `;
                    startOtpTimer();
                    document.getElementById('otp0').focus();
                }
                showToast('✅ کد تایید ارسال شد', 'success');
            } catch (err) {
                showToast('❌ ' + err.message, 'error');
            }
        }

        async function authVerifyOtp() {
            const otp = getOtpValue();
            if (otp.length < 5) {
                const e = document.getElementById('otpError');
                if (e) { e.style.display = 'block';
                    e.textContent = '⚠️ کد ۵ رقمی را کامل وارد کنید.'; }
                return;
            }

            try {
                const result = await api.verifyOTP(authState.phone, otp);
                if (result.success) {
                    localStorage.setItem(TOKEN_KEY, result.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(result.user));
                    currentUser = result.user;
                    updateProfileBtn();
                    closeAuth();
                    const name = result.user.firstName || result.user.phone || 'کاربر';
                    showToast(`✅ خوش آمدید ${name}! ورود موفق ✓`, 'success');
                    checkPendingRequest();
                } else {
                    showToast('❌ ' + (result.message || 'خطا در تایید کد'), 'error');
                }
            } catch (err) {
                showToast('❌ ' + err.message, 'error');
            }
        }

        // ─── TELEGRAM INTEGRATION ─────────────────────────────────────────────
        function getTelegramUser() {
            if (window.Telegram && window.Telegram.WebApp) {
                try {
                    const user = window.Telegram.WebApp.initDataUnsafe?.user;
                    const initData = window.Telegram.WebApp.initData;
                    if (user) {
                        return { user, initData, isValid: true };
                    }
                } catch (e) {
                    console.warn('Could not get Telegram user:', e);
                }
            }
            return null;
        }

        function checkTelegramLogin() {
            const telegramData = getTelegramUser();
            if (telegramData && telegramData.user) {
                validateTelegramUser(telegramData);
                return true;
            }
            return false;
        }

        async function validateTelegramUser(telegramData) {
            try {
                const result = await api.telegramLogin(telegramData.initData, telegramData.user);
                if (result.success) {
                    localStorage.setItem(TOKEN_KEY, result.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(result.user));
                    currentUser = result.user;
                    updateProfileBtn();
                    closeAuth();
                    closeAllModals();
                    const name = result.user.firstName || result.user.username || 'کاربر';
                    showToast(`✅ خوش آمدید ${name}!`, 'success');
                    checkPendingRequest();
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.expand();
                    }
                } else {
                    showToast('❌ ' + (result.message || 'خطا در ورود با تلگرام'), 'error');
                }
            } catch (err) {
                console.error('Telegram login error:', err);
                showToast('❌ ' + err.message, 'error');
            }
        }

        // ─── TOKEN HANDLING ────────────────────────────────────────────────────
        function getTokenFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const userData = urlParams.get('user_data');
            if (token) return { token, userData };
            return null;
        }

        function handleTokenLogin(tokenData) {
            try {
                let userInfo = null;
                if (tokenData.userData) {
                    try {
                        userInfo = JSON.parse(decodeURIComponent(tokenData.userData));
                    } catch (e) {}
                }
                if (!userInfo && tokenData.token) {
                    try {
                        const parts = tokenData.token.split('.');
                        if (parts.length === 3) {
                            const payload = JSON.parse(atob(parts[1]));
                            userInfo = {
                                id: payload.sub || payload.userId || payload.id,
                                phone: payload.phone || payload.mobile,
                                firstName: payload.firstName || payload.name,
                                lastName: payload.lastName,
                                username: payload.username,
                                telegramId: payload.telegramId
                            };
                        }
                    } catch (e) {}
                }
                if (!userInfo) {
                    userInfo = { id: `user_${Date.now()}`, token: tokenData.token };
                }
                loginWithToken(tokenData.token, userInfo);
            } catch (error) {
                console.error('❌ Error handling token login:', error);
                showToast('❌ خطا در ورود با توکن', 'error');
            }
        }

        function loginWithToken(token, userInfo) {
            currentUser = {
                id: userInfo.id || `user_${Date.now()}`,
                token: token,
                phone: userInfo.phone || userInfo.mobile || 'شماره نامشخص',
                firstName: userInfo.firstName || userInfo.name || '',
                lastName: userInfo.lastName || '',
                username: userInfo.username || '',
                telegramId: userInfo.telegramId || userInfo.id || null,
                app: sessionStorage.getItem('selected_app') || 'telegram',
                loginMethod: 'app_deeplink',
                loginAt: new Date().toISOString(),
                requests: []
            };
            localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
            const url = new URL(window.location);
            url.searchParams.delete('token');
            url.searchParams.delete('user_data');
            window.history.replaceState({}, document.title, url.pathname + url.search);
            updateProfileBtn();
            closeAuth();
            const name = currentUser.firstName || currentUser.username || 'کاربر';
            showToast(`✅ خوش آمدید ${name}! ورود موفق ✓`, 'success');
            sessionStorage.removeItem('selected_app');
            checkPendingRequest();
        }

        function checkPendingRequest() {
            const pending = sessionStorage.getItem('pendingRequest');
            if (pending) {
                try {
                    const data = JSON.parse(pending);
                    const service = state.allItems.find(s => s.Id === data.serviceId);
                    if (service) {
                        requestState = {
                            service: service,
                            docs: getDocs(service),
                            values: {},
                            step: data.step || 0,
                            totalSteps: getDocs(service).length + 2
                        };
                        data.documents.forEach(doc => { requestState.values[doc.title] = doc.value; });
                        if (data.receiptImage) requestState.receiptImage = data.receiptImage;
                        renderRequestModal();
                        document.getElementById('requestOverlay').classList.add('open');
                        document.body.style.overflow = 'hidden';
                        sessionStorage.removeItem('pendingRequest');
                    }
                } catch (e) { console.error('Error restoring request:', e); }
            }
        }

        function loginSuccess(phone, data) {
            currentUser = {
                id: data.userId || `user_${Date.now()}`,
                phone: phone || 'شماره نامشخص',
                token: data.token || '',
                user: data.user || null,
                telegramId: data.telegramId || null,
                telegramUsername: data.telegramUsername || null,
                loginMethod: 'telegram_bot',
                requests: data.requests || [],
                loginAt: new Date().toISOString()
            };
            localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
            updateProfileBtn();
            closeAuth();
            const name = data.user?.firstName || data.telegramUsername || 'کاربر';
            showToast(`✅ خوش آمدید ${name}! ورود موفق ✓`, 'success');
            checkPendingRequest();
        }

        // ─── PROFILE ────────────────────────────────────────────────────────────
function openProfile() {
    if (!currentUser) { openAuth(); return; }
    api.getMyRequests()
        .then(requests => {
            currentUser.requests = requests || [];
            localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
            renderProfileModal();
        })
        .catch(() => renderProfileModal());
    document.getElementById('profileOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}
        function closeProfile(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('profileOverlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        function renderProfileModal() {
            const modal = document.getElementById('profileModal');
            if (!modal) return;

            const requests = currentUser.requests || [];
            const statusLabel = s => ({ pending: 'در انتظار بررسی', processing: 'در حال انجام', done: 'انجام شده' } [s] ||
            s);
            const statusClass = s => ({ pending: 'status-pending', processing: 'status-processing',
                done: 'status-done' } [s] || 'status-pending');

            const reqHTML = requests.length ?
                requests.map(r =>
                    `<div class="request-item">
                                <div class="request-item-head">
                                    <div class="request-item-title">${r.serviceTitle}</div>
                                    <span class="request-status ${statusClass(r.status)}">${statusLabel(r.status)}</span>
                                </div>
                                <div class="request-item-meta">
                                    <span>💰 ${formatPrice(r.price)} تومان</span>
                                    <span>📅 ${r.submittedAt ? new Date(r.submittedAt).toLocaleDateString('fa-IR') : '—'}</span>
                                </div>
                            </div>`
                ).join('') :
                `<div class="empty-state" style="padding:32px 0"><div class="empty-icon">📋</div><h3>هنوز درخواستی ندارید</h3><p>پس از ثبت درخواست، اینجا نمایش داده می‌شود.</p></div>`;

            const isTelegram = currentUser.loginMethod === 'telegram_mini_app';
            const telegramUsername = currentUser.username ? `@${currentUser.username}` : '';
            const premiumBadge = currentUser.isPremium ? '⭐' : '';

            modal.innerHTML =
                `<div class="modal-header"><div class="modal-header-info"><h2>👤 پروفایل من</h2></div><button class="modal-close" onclick="closeProfile()">✕</button></div>
                    <div class="modal-body">
                        <div class="profile-header-info">
                            <div class="avatar">${isTelegram ? '✈️' : '👤'}</div>
                            <div>
                                <div class="profile-name">
                                    ${currentUser.firstName || currentUser.username || 'کاربر'} ${currentUser.lastName || ''}
                                    ${premiumBadge ? `<span style="font-size:14px;color:#FFD700;">${premiumBadge}</span>` : ''}
                                </div>
                                <div class="profile-phone">${currentUser.phone || 'شماره نامشخص'}</div>
                                <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                                    ${isTelegram ? 
                                        `<span style="font-size:14px;">✈️</span>
                                         <span style="font-size:12px;color:var(--text3);">ورود با تلگرام</span>
                                         ${telegramUsername ? `<span style="font-size:12px;color:var(--brand);">${telegramUsername}</span>` : ''}` 
                                        : 
                                        `<span style="font-size:12px;color:var(--text3);">${currentUser.loginMethod || 'ورود معمولی'}</span>`
                                    }
                                </div>
                            </div>
                            <button class="logout-btn" style="margin-right:auto" onclick="logout()">خروج</button>
                        </div>
                        <div style="font-size:14px;font-weight:700;color:var(--text2);margin-bottom:10px;margin-top:8px">📋 درخواست‌های من</div>
                        <div class="request-list">${reqHTML}</div>
                    </div>`;
        }

        // ─── LOGOUT ─────────────────────────────────────────────────────────────
        async function logout() {
            try { await api.logout(); } catch (err) { console.warn('Logout API error:', err); }
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
            currentUser = null;
            updateProfileBtn();
            closeProfile();
            showToast('با موفقیت خارج شدید.', '');
        }

        // ─── LOAD USER FROM STORAGE ──────────────────────────────────────────
        function loadUserFromStorage() {
            const token = localStorage.getItem(TOKEN_KEY);
            const userData = localStorage.getItem(USER_KEY);
            if (token && userData) {
                try {
                    currentUser = JSON.parse(userData);
                    api.getMe()
                        .then(user => {
                            currentUser = { ...currentUser, ...user };
                            localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
                            updateProfileBtn();
                        })
                        .catch(() => {
                            localStorage.removeItem(TOKEN_KEY);
                            localStorage.removeItem(USER_KEY);
                            currentUser = null;
                            updateProfileBtn();
                        });
                } catch {
                    localStorage.removeItem(TOKEN_KEY);
                    localStorage.removeItem(USER_KEY);
                    currentUser = null;
                }
            }
        }

        function closeAllModals() {
            document.getElementById('detailOverlay').classList.remove('open');
            document.getElementById('requestOverlay').classList.remove('open');
            document.getElementById('authOverlay').classList.remove('open');
            document.getElementById('profileOverlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        // ─── APP LINKS ──────────────────────────────────────────────────────────
        const APP_LINKS = {
            telegram: { webLink: 'https://t.me/cofenett_bot?start=login', label: 'ایمیل', icon: '✈️' },
            sorush: { webLink: 'https://sapp.ir/cofenett_bot', label: 'سروش', icon: '🔵' },
            bale: { webLink: 'https://bale.ai/cofenett_bot', label: 'بله', icon: '🟣' },
            eita: { webLink: 'https://eitaa.com/cofenett_bot', label: 'ایتا', icon: '🟢' },
            rubika: { webLink: 'https://rubika.ir/cofenett_bot', label: 'روبیکا', icon: '🔶' },
            whatsapp: { webLink: 'https://wa.me/1234567890?text=Hello%20I%20want%20to%20login%20to%20Cafenet',
                label: 'واتساپ', icon: '💬' }
        };

        function openApp(appId) {
            const appConfig = APP_LINKS[appId];
            if (!appConfig) { showToast('❌ اپلیکیشن یافت نشد', 'error'); return; }
            const link = appConfig.deepLink || appConfig.webLink || appConfig.link;
            sessionStorage.setItem('selected_app', appId);
            sessionStorage.setItem('app_open_time', Date.now().toString());
            showToast(`📱 در حال باز کردن ${getAppName(appId)}...`, '');
            if (appConfig.deepLink) {
                window.location.href = appConfig.deepLink;
                setTimeout(() => { window.open(appConfig.webLink || appConfig.link, '_blank'); }, 3000);
            } else {
                window.open(link, '_blank');
            }
            setTimeout(() => { showToast('✅ پس از ورود در اپلیکیشن، به این صفحه بازگردید', ''); }, 2000);
            startAppReturnListener();
        }

        function getAppName(appId) {
            const names = { telegram: 'تلگرام', sorush: 'سروش', bale: 'بله', eita: 'ایتا', rubika: 'روبیکا',
                whatsapp: 'واتساپ' };
            return names[appId] || appId;
        }

        function startAppReturnListener() {
            if (window._appReturnInterval) clearInterval(window._appReturnInterval);
            let attempts = 0;
            window._appReturnInterval = setInterval(() => {
                attempts++;
                const token = getTokenFromUrl();
                if (token) {
                    clearInterval(window._appReturnInterval);
                    handleTokenLogin(token);
                    return;
                }
                if (attempts > 60) clearInterval(window._appReturnInterval);
            }, 1000);
        }

        function openTelegramMiniApp() {
            const botUsername = 'cofenett_bot';
            const startParam = 'login';
            const url = `https://t.me/${botUsername}?startapp=${startParam}`;
            showToast('📱 در حال باز کردن تلگرام...', '');
            window.open(url, '_blank');
            setTimeout(() => { showToast('✅ پس از ورود در تلگرام، به این صفحه بازگردید', ''); }, 2000);
            startAppReturnListener();
        }

        function selectApp(id) {
            authState.app = id;
            document.querySelectorAll('.app-btn').forEach(b => b.classList.remove('selected'));
            const btn = document.getElementById('app-' + id);
            if (btn) btn.classList.add('selected');
            const err = document.getElementById('appError');
            if (err) err.style.display = 'none';
        }

        // ─── INIT ──────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function() {
            loadUserFromStorage();
            loadInitialData();

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (document.getElementById('detailOverlay').classList.contains('open')) closeDetail();
                    if (document.getElementById('requestOverlay').classList.contains('open')) closeRequest();
                    if (document.getElementById('authOverlay').classList.contains('open')) closeAuth();
                    if (document.getElementById('profileOverlay').classList.contains('open')) closeProfile();
                }
            });

            document.getElementById('detailOverlay').addEventListener('click', closeDetail);
            document.getElementById('requestOverlay').addEventListener('click', dontcloseRequest);
            document.getElementById('authOverlay').addEventListener('click', closeAuth);
            document.getElementById('profileOverlay').addEventListener('click', closeProfile);

            if (checkTelegramLogin()) {
                console.log('✅ Logged in via Telegram Mini App');
            } else {
                const token = getTokenFromUrl();
                if (token) handleTokenLogin(token);
            }
        });

        window.api = api;
        window.loadInitialData = loadInitialData;
    </script>
  </body>
</html>
