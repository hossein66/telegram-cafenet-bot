<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کافی‌نت آنلاین – خدمات اداری و دولتی</title>
    <!-- Add these for faster loading -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://telegram.org">
<link rel="preload" href="/api/categories" as="fetch" crossorigin>
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com"> -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset & Base ─── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --brand: #1B4FD8;
            --brand-dark: #1239A6;
            --brand-light: #EEF3FF;
            --brand-hover: #2B5FE8;
            --accent: #F59E0B;
            --surface: #FFFFFF;
            --surface2: #F7F8FC;
            --surface3: #EFF1F8;
            --text: #111827;
            --text2: #374151;
            --text3: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
            --danger: #EF4444;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
            --shadow-lg: 0 20px 48px rgba(0,0,0,.12), 0 8px 20px rgba(0,0,0,.07);
            --radius: 12px;
            --radius-lg: 20px;
            --font: 'Vazirmatn', system-ui, sans-serif;
        }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font); background: var(--surface2); color: var(--text); line-height: 1.6; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--surface2); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

        /* ─── HEADER ─── */
        header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 68px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; cursor: pointer; }
        .logo-icon { width: 40px; height: 40px; background: var(--brand); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
        .logo-text { font-size: 18px; font-weight: 800; color: var(--brand); letter-spacing: -0.3px; }
        .logo-sub { font-size: 11px; color: var(--text3); font-weight: 400; margin-top: -2px; }
        .btn-profile { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--surface); font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; transition: .15s; white-space: nowrap; }
        .btn-profile:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }

        /* ─── HERO ─── */
        .hero { background: linear-gradient(90deg, var(--brand-dark), var(--brand)); border-bottom: 1px solid rgba(0,0,0,.15); padding: 14px 24px; }
        .hero-bar { max-width: 700px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .hero-search-wrap { position: relative; width: 100%; }
        .hero-search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: rgba(0,0,0,.5); pointer-events: none; }
        .hero-search-input { width: 100%; padding: 12px 44px 12px 16px; border: none; border-radius: 40px; font-size: 15px; background: rgba(255,255,255,.9); transition: .2s; font-family: inherit; outline: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        .hero-search-input::placeholder { color: rgba(0,0,0,.5); }
        .hero-search-input:focus { background: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,.3), 0 2px 12px rgba(0,0,0,.12); }

        /* ─── MAIN LAYOUT ─── */
        .page-body { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; display: grid; grid-template-columns: 260px 1fr; gap: 28px; align-items: start; }
        @media(max-width:900px){ .page-body { grid-template-columns: 1fr; } .sidebar { display: none; } .sidebar.show { display: block; position: fixed; top: 70px; right: 0; width: 280px; height: calc(100vh - 70px); z-index: 50; border-radius: 0; box-shadow: var(--shadow-lg); border: none; border-left: 1px solid var(--border); } }
        @media(max-width:480px){ .page-body { padding: 16px 12px 40px; } .header-inner { padding: 0 12px; height: 60px; } .btn-profile span { display: none; } .hero { padding: 10px 12px; } .hero-search-input { font-size: 13px; padding: 10px 38px 10px 12px; } .service-grid { grid-template-columns: 1fr !important; } }

        /* ─── SIDEBAR ─── */
        .sidebar { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-sm); position: sticky; top: 84px; overflow: hidden; }
        .sidebar-head { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; color: var(--text3); letter-spacing: .3px; display: flex; align-items: center; gap: 8px; background: var(--surface2); }
        .cat-list { overflow-y: auto; max-height: calc(100vh - 180px); padding: 4px 0; }
        .cat-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; transition: background .15s, color .15s; font-size: 14px; font-weight: 500; color: var(--text2); border-right: 3px solid transparent; position: relative; }
        .cat-item:hover { background: var(--surface2); color: var(--brand); }
        .cat-item.active { background: var(--brand-light); color: var(--brand); border-right-color: var(--brand); font-weight: 600; }
        .cat-item .cat-count { margin-right: auto; background: var(--surface3); color: var(--text3); font-size: 11px; padding: 1px 9px; border-radius: 20px; font-weight: 600; }
        .cat-item.active .cat-count { background: var(--brand); color: #fff; }
        .cat-icon { font-size: 16px; flex-shrink: 0; width: 24px; text-align: center; }

        .mobile-sidebar-btn { display: none; padding: 10px 16px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface); font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; align-items: center; gap: 8px; margin-bottom: 16px; width: 100%; transition: .15s; }
        .mobile-sidebar-btn:hover { border-color: var(--brand); color: var(--brand); }
        @media(max-width:900px){ .mobile-sidebar-btn { display: flex; } }

        .content-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
        .content-head h2 { font-size: 20px; font-weight: 700; color: var(--text); }
        .content-head-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }

        .filter-tabs { display: flex; gap: 6px; background: var(--surface3); padding: 4px; border-radius: 10px; }
        .filter-tab { padding: 6px 14px; border-radius: 7px; border: none; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text3); transition: .15s; }
        .filter-tab.active { background: var(--surface); color: var(--brand); font-weight: 600; box-shadow: var(--shadow-sm); }
        .filter-tab:hover:not(.active) { color: var(--text); }

        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .service-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: transform .18s, box-shadow .18s, border-color .18s; display: flex; flex-direction: column; gap: 10px; }
        .service-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--brand); }
        .service-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
        .service-card h3 { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.45; flex: 1; }
        .service-badge { flex-shrink: 0; background: var(--brand-light); color: var(--brand); font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
        .service-cats { display: flex; flex-wrap: wrap; gap: 5px; }
        .service-cat-tag { background: var(--surface3); color: var(--text3); font-size: 11px; padding: 2px 10px; border-radius: 6px; font-weight: 500; }
        .service-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
        .service-price { font-size: 16px; font-weight: 700; color: var(--brand); }
        .service-price span { font-size: 11px; font-weight: 400; color: var(--text3); margin-right: 2px; }
        .service-discount { font-size: 11px; color: var(--success); font-weight: 500; }
        .service-duration { font-size: 12px; color: var(--text3); margin-top: -4px; }
        .btn-request { padding: 6px 16px; border-radius: 8px; border: none; background: var(--brand); color: #fff; font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; white-space: nowrap; }
        .btn-request:hover { background: var(--brand-dark); }

        .loading-spinner { display: flex; justify-content: center; align-items: center; gap: 10px; padding: 30px 0; color: var(--text3); font-size: 14px; }
        .loading-spinner .spinner { width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .end-message { text-align: center; padding: 30px 0; color: var(--text3); font-size: 14px; font-weight: 500; }

        .search-banner { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .search-banner span { font-size: 14px; color: var(--text2); }
        .search-banner strong { color: var(--brand); }
        .btn-clear-search { padding: 4px 14px; border-radius: 7px; border: 1.5px solid var(--border); background: transparent; font-family: var(--font); font-size: 12px; color: var(--text3); cursor: pointer; transition: .15s; }
        .btn-clear-search:hover { border-color: var(--danger); color: var(--danger); }

        /* ─── MODALS ─── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 500; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; animation: slideUp .25s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 2; display: flex; align-items: flex-start; gap: 14px; }
        .modal-header-info { flex: 1; }
        .modal-header h2 { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.35; margin-bottom: 4px; }
        .modal-close { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: .15s; flex-shrink: 0; }
        .modal-close:hover { background: var(--surface2); color: var(--text); }
        .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
        .modal-footer { padding: 16px 24px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; position: sticky; bottom: 0; background: var(--surface); }
        .modal-footer .btn-primary, .modal-footer .btn-secondary { flex: 1; min-width: 100px; }

        .btn-primary { padding: 12px 20px; border-radius: 10px; border: none; background: var(--brand); color: #fff; font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; }
        .btn-primary:hover { background: var(--brand-dark); }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
        .btn-secondary { padding: 12px 20px; border-radius: 10px; border: 1.5px solid var(--border); background: transparent; color: var(--text2); font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; transition: .15s; }
        .btn-secondary:hover { border-color: var(--brand); color: var(--brand); }

        .price-block { background: var(--brand-light); border: 1px solid #C7D9FF; border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
        .price-block .price-label { font-size: 13px; color: var(--brand); font-weight: 500; }
        .price-block .price-val { font-size: 22px; font-weight: 800; color: var(--brand); }
        .price-block .price-unit { font-size: 13px; font-weight: 400; color: var(--text3); margin-right: 4px; }
        .discount-note { font-size: 12px; color: var(--success); margin-top: 4px; }
        .docs-section h3 { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .doc-list { display: flex; flex-direction: column; gap: 6px; }
        .doc-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; display: flex; align-items: center; gap: 10px; }
        .doc-num { width: 22px; height: 22px; background: var(--brand); color: #fff; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .doc-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
        .doc-type-badge { background: var(--surface3); color: var(--text3); font-size: 10px; padding: 2px 10px; border-radius: 6px; font-weight: 600; }

        .flow-modal { max-width: 500px; }
        .flow-progress { padding: 14px 24px 10px; border-bottom: 1px solid var(--border); background: var(--surface2); }
        .flow-steps { display: flex; align-items: center; gap: 0; }
        .flow-step { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; position: relative; }
        .flow-step:not(:last-child)::after { content: ''; position: absolute; left: 0; top: 15px; width: 100%; height: 2px; background: var(--border); z-index: 0; }
        .flow-step:is(:last-child)::after { content: ''; position: absolute; left: 50%; top: 15px; width: 100%; height: 2px; background: var(--border); z-index: 0; }
        .flow-step.done::after, .flow-step.active::after { background: var(--brand); }
        .step-circle { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text3); z-index: 1; transition: .2s; }
        .flow-step.done .step-circle { background: var(--brand); border-color: var(--brand); color: #fff; }
        .flow-step.active .step-circle { border-color: var(--brand); color: var(--brand); box-shadow: 0 0 0 4px rgba(27,79,216,.12); }
        .step-label { font-size: 10px; color: var(--text3); font-weight: 500; text-align: center; max-width: 60px; }
        .flow-step.active .step-label { color: var(--brand); font-weight: 600; }
        .flow-step.done .step-label { color: var(--success); }

        .field-group { display: flex; flex-direction: column; gap: 5px; }
        .field-label { font-size: 13px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 4px; }
        .field-required { color: var(--danger); font-weight: 700; margin-right: 4px; }
        .field-hint { font-size: 12px; color: var(--text3); }
        .field-input { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 14px; color: var(--text); background: var(--surface); outline: none; transition: .2s; width: 100%; }
        .field-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(27,79,216,.08); }
        .field-input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(239,68,68,.08); }
        .field-error { font-size: 12px; color: var(--danger); font-weight: 500; }
        .field-upload { border: 2px dashed var(--border); border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; transition: .2s; background: var(--surface2); }
        .field-upload:hover { border-color: var(--brand); background: var(--brand-light); }
        .field-upload input[type=file] { display: none; }
        .upload-icon { font-size: 28px; margin-bottom: 6px; color: var(--text3); }
        .upload-text { font-size: 13px; color: var(--text3); font-weight: 500; }
        .upload-preview { max-width: 100%; max-height: 120px; border-radius: 6px; margin-top: 8px; object-fit: contain; }

        .field-options { display: flex; flex-direction: column; gap: 8px; padding: 8px 0; }
        .option-item { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 8px; background: var(--surface2); cursor: pointer; transition: .15s; }
        .option-item:hover { background: var(--brand-light); }
        .option-item input[type="radio"], .option-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--brand); cursor: pointer; flex-shrink: 0; }
        .option-item label { font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; flex: 1; }

        .field-select { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 14px; color: var(--text); background: var(--surface); outline: none; transition: .2s; width: 100%; appearance: auto; }
        .field-select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(27,79,216,.08); }
        .field-boolean { display: flex; gap: 16px; padding: 6px 0; }
        .field-boolean label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text2); }
        .field-boolean input[type="radio"] { width: 18px; height: 18px; accent-color: var(--brand); cursor: pointer; }
        .field-char-count { font-size: 11px; color: var(--text3); text-align: left; margin-top: 2px; }

        .field-notice { background: #FEF3C7; border-right: 4px solid var(--accent); padding: 12px 16px; border-radius: 8px; font-size: 13px; color: #78350F; margin-bottom: 16px; line-height: 1.8; }
        .field-notice.lock { background: #FEE2E2; border-right-color: var(--danger); color: #991B1B; }

        .receipt-info { background: #FFFBEB; border: 1.5px solid #FCD34D; border-radius: var(--radius); padding: 14px 18px; margin-bottom: 4px; }
        .receipt-info h4 { font-size: 14px; font-weight: 700; color: #92400E; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .receipt-line { display: flex; gap: 10px; font-size: 13px; margin-bottom: 4px; align-items: center; flex-wrap: wrap; }
        .receipt-line .rk { color: #92400E; font-weight: 500; min-width: 100px; }
        .receipt-line .rv { color: var(--text); font-weight: 700; font-family: monospace; direction: rtl; text-align: right; }
        .receipt-copy-btn { background: var(--brand); color: #fff; border: none; border-radius: 6px; padding: 2px 10px; font-family: var(--font); font-size: 11px; cursor: pointer; margin-right: 6px; }
        .receipt-copy-btn:hover { background: var(--brand-dark); }

        .summary-list { display: flex; flex-direction: column; gap: 6px; }
        .summary-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 12px; background: var(--surface2); border-radius: 8px; font-size: 13px; }
        .summary-key { color: var(--text3); font-weight: 500; flex: 1; min-width: 0; }
        .summary-val { color: var(--text); font-weight: 600; text-align: left; word-break: break-all; }
        .summary-img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }

        .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column-reverse; gap: 8px; pointer-events: none; }
        .toast { background: var(--text); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg); animation: toastIn .25s ease; max-width: 380px; text-align: center; pointer-events: auto; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .service-page { max-width: 800px; margin: 0 auto; padding: 32px 24px 64px; display: none; }
        .service-page.active { display: block; }
        .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text3); margin-bottom: 20px; flex-wrap: wrap; }
        .breadcrumb a { color: var(--brand); cursor: pointer; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb-sep { color: var(--border); }
        .sp-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px 28px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
        .sp-title { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.4; margin-bottom: 10px; }
        .sp-cats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .sp-cat { background: var(--brand-light); color: var(--brand); font-size: 12px; font-weight: 600; padding: 3px 12px; border-radius: 20px; }
        .sp-price-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding-top: 14px; border-top: 1px solid var(--border); }
        .sp-price { font-size: 26px; font-weight: 800; color: var(--brand); }
        .sp-price-label { font-size: 12px; color: var(--text3); font-weight: 400; margin-right: 4px; }
        .sp-disc { font-size: 13px; color: var(--success); margin-top: 2px; }
        .btn-sp-request { padding: 10px 28px; border-radius: 10px; border: none; background: var(--brand); color: #fff; font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; }
        .btn-sp-request:hover { background: var(--brand-dark); }
        .sp-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 14px; }

// ════════════════════════════════════════════════════════════════════
//  CONFIG — point this at your running FastAPI backend (app.py)
// ════════════════════════════════════════════════════════════════════
const API_BASE = window.CAFENET_API_BASE || 'http://127.0.0.1:8001';//https://cofenet-online.ir

// ════════════════════════════════════════════════════════════════════
//  NUMBER CONVERSION HELPERS
// ════════════════════════════════════════════════════════════════════
function convertPersianToEnglish(str) {
    if (!str) return str;
    const persianDigits = '۰۱۲۳۴۵۶۷۸۹';
    const englishDigits = '0123456789';
    return str.replace(/[۰-۹]/g, (char) => {
        return englishDigits[persianDigits.indexOf(char)] || char;
    });
}

function convertEnglishToPersian(str) {
    if (!str) return str;
    const persianDigits = '۰۱۲۳۴۵۶۷۸۹';
    const englishDigits = '0123456789';
    return str.replace(/[0-9]/g, (char) => {
        return persianDigits[englishDigits.indexOf(char)] || char;
    });
}

function convertInputToEnglish(input) {
    if (!input) return;
    const start = input.selectionStart;
    const end = input.selectionEnd;
    const converted = convertPersianToEnglish(input.value);
    if (converted !== input.value) {
        input.value = converted;
        input.setSelectionRange(start, end);
    }
}

// ════════════════════════════════════════════════════════════════════
//  API HELPER
// ════════════════════════════════════════════════════════════════════
async function apiFetch(path, options = {}) {
    const token = localStorage.getItem('cafenet_token');
    const headers = Object.assign({ 'Content-Type': 'application/json' }, options.headers || {});
    if (token) headers['Authorization'] = `Bearer ${token}`;
    let res;
    try {
        res = await fetch(API_BASE + path, { ...options, headers });
    } catch (e) {
        throw new Error('عدم دسترسی به سرور. آدرس API را بررسی کنید.');
    }
    if (!res.ok) {
        let detail = `خطای سرور (${res.status})`;
        try {
            const j = await res.json();
            if (j && j.detail) detail = typeof j.detail === 'string' ? j.detail : JSON.stringify(j.detail);
        } catch (e) {}
        const err = new Error(detail);
        err.status = res.status;
        throw err;
    }
    if (res.status === 204) return null;
    try { return await res.json(); } catch (e) { return null; }
}

// ════════════════════════════════════════════════════════════════════
//  GLOBAL STATE & CACHES
// ════════════════════════════════════════════════════════════════════
let CATEGORIES = [];
const CITY_CACHE = {};
let PROVINCES = [];
let DOCTYPE_MAP = {};
const serviceCache = {};

let state = {
    mode: 'top',
    catName: null,
    searchTerm: '',
    cursor: null,
    hasMore: true,
    loading: false,
    total: 0
};
let PAYMENT_INFO = {
    cardNumber: '5041-7210-0916-7876',
    personName: 'محمد حسین نوابی',
    bankName: 'بانک ملی'
};
let requestState = {};
let authState = { step: 'phone', phone: '', seconds: 0, timer: null, callback: null };
let currentUser = JSON.parse(localStorage.getItem('cafenet_user') || 'null');
let currentServiceDetail = null;

// ════════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════════
function toPersianNum(n) {
    if (n === undefined || n === null) return '۰';
    return convertEnglishToPersian(String(n));
}
// ════════════════════════════════════════════════════════════════════
//  FETCH PAYMENT INFO ON PAGE LOAD
// ════════════════════════════════════════════════════════════════════
async function fetchPaymentInfo() {
    try {
        const paymentInfo = await apiFetch('/api/payment/info');
        if (paymentInfo) {
            PAYMENT_INFO.cardNumber = paymentInfo.cardNumber || PAYMENT_INFO.cardNumber;
            PAYMENT_INFO.personName = paymentInfo.accountHolder || PAYMENT_INFO.personName;
            PAYMENT_INFO.bankName = paymentInfo.bankName || PAYMENT_INFO.bankName;
            console.log('✅ Payment info loaded:', PAYMENT_INFO);
        }
    } catch (e) {
        console.warn('Could not fetch payment info, using defaults:', e);
    }
}
function formatPrice(p) {
    if (!p && p !== 0) return '۰';
    return convertEnglishToPersian(Number(p).toLocaleString('en'));
}

function typeIcon(type) {
    const icons = {
        'text': '📝', 'number': '🔢', 'nationalCode': '🆔', 'date': '📅',
        'checkbox': '☑️', 'radio': '🔘', 'select': '📋', 'boolean': '✔️',
        'province': '📍', 'city': '🏙️', 'file': '📎', 'textarea': '📄',
        'licensePlate': '🚗', 'motorcycleLicensePlate': '🏍️'
    };
    return icons[type] || '📄';
}

function mapFieldTypeToTypeId(type) {
    if (type === 'nationalCode') return 6;
    if (type === 'date') return 8;
    if (type === 'file') return 3;
    if (type === 'number') return 2;
    return 1;
}

function getDocInfo(doc) {
    const dt = DOCTYPE_MAP[doc.typeId] || { title: 'متن', REx: '.*' };
    return {
        title: doc.title,
        typeId: doc.typeId,
        type: doc.type || 'text',
        displayType: dt.title,
        regex: dt.REx,
        placeholder: doc.placeholder || '',
        isRequired: doc.isRequired || false,
        options: doc.options || [],
        validationRules: doc.validationRules || {}
    };
}

function buildDocsFromDetail(detailData) {
    const forms = detailData.forms || [];
    const form = forms.length ? forms[0] : null;
    const rawDocs = (form && form.fields) ? form.fields.map(f => ({
        title: f.label,
        typeId: mapFieldTypeToTypeId(f.type),
        type: f.type,
        placeholder: f.placeholder || '',
        isRequired: f.isRequired || false,
        options: f.options || [],
        key: f.key,
        validationRules: f.validationRules || {}
    })) : [];
    if (!rawDocs.length) {
        return [{ title: 'نیازی به مدارک نیست', typeId: 1, type: 'text', displayType: 'متن', regex: '.*', placeholder: '', isRequired: false, options: [], validationRules: {} }];
    }
    return rawDocs.map(getDocInfo);
}

function validateDoc(value, doc) {
    // Convert Persian numbers to English for validation
    const englishValue = convertPersianToEnglish(value);
    
    if (doc.type === 'nationalCode' && !/^[0-9]{10}$/.test(englishValue)) {
        return { ok: false, msg: 'کد ملی باید ۱۰ رقم باشد.' };
    }
    if (doc.type === 'number' && isNaN(englishValue)) {
        return { ok: false, msg: 'لطفاً یک عدد معتبر وارد کنید.' };
    }
    if (doc.type === 'date' && value) {
        const dateObj = new Date(value);
        if (isNaN(dateObj.getTime())) return { ok: false, msg: 'تاریخ وارد شده معتبر نیست.' };
    }
    if (doc.validationRules?.min && englishValue.length < doc.validationRules.min) {
        return { ok: false, msg: `حداقل ${doc.validationRules.min} کاراکتر وارد کنید.` };
    }
    if (doc.validationRules?.max && englishValue.length > doc.validationRules.max) {
        return { ok: false, msg: `حداکثر ${doc.validationRules.max} کاراکتر مجاز است.` };
    }
    if (doc.validationRules?.pattern) {
        try {
            const regex = new RegExp(doc.validationRules.pattern);
            if (!regex.test(englishValue)) return { ok: false, msg: 'فرمت وارد شده معتبر نیست.' };
        } catch (e) {}
    }
    return { ok: true };
}

function showToast(msg, type = '') {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

// ════════════════════════════════════════════════════════════════════
//  RANDOM NUMBER GENERATOR FOR PRICE
// ════════════════════════════════════════════════════════════════════
function generateRandomNumbers(count = 3) {
    let numbers = [];
    for (let i = 0; i < count; i++) {
        numbers.push(Math.floor(Math.random() * 10)); // 0-9
    }
    return numbers;
}

function addRandomNumbersToPrice(price) {
    // Generate a random number between 100 and 999
    const randomValue = Math.floor(Math.random() * 900) + 100; // 100 to 999
    
    // Convert to array of digits for display
    const randomNumbers = String(randomValue).split('').map(Number);
    
    return {
        finalPrice: price + randomValue,
        randomNumbers: randomNumbers,
        addedAmount: randomValue
    };
}

    async function init() {

                localStorage.removeItem('cafenet_user');

    // ════════════════════════════════════════════════════════════════════
    //  SIDEBAR / CATEGORY NAV
    //  (CATEGORIES already includes synthetic rows: id -1 "پرکاربرد", id 0 "همه خدمات")

    function buildSidebar() {
        const list = document.getElementById('catList');
        if (!list) return;
        list.innerHTML = CATEGORIES.map(cat => {
            let active = false;
            if (cat.id === -1) active = state.mode === 'top';
            else if (cat.id === 0) active = state.mode === 'all';
            else active = state.mode === 'category' && state.catName === cat.name;
            return `<div class="cat-item ${active ? 'active' : ''}" onclick="selectCat(${cat.id})">
                        <span class="cat-icon">${cat.icon || '📂'}</span> ${cat.name}
                        <span class="cat-count">${toPersianNum(cat.count || 0)}</span>
                    </div>`;
        }).join('');
    }

    function selectCat(id) {
        const cat = CATEGORIES.find(c => c.id === id);
        document.getElementById('searchInput').value = '';
        clearSearchBanner();
        closeServicePage();
        if (id === -1) {
            state.mode = 'top'; state.catName = null; state.searchTerm = '';
        } else if (id === 0 || id === null) {
            state.mode = 'all'; state.catName = null; state.searchTerm = '';
        } else {
            state.mode = 'category'; state.catName = cat ? cat.name : null; state.searchTerm = '';
        }
        buildSidebar();
        loadServices(true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('sidebar').classList.remove('show');
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('show');
    }

function resetView() {
    closeServicePage();
    state.mode = 'top'; state.catName = null; state.searchTerm = '';

    // ════════════════════════════════════════════════════════════════════

    function startSearch(term) {
        state.mode = 'search'; state.searchTerm = term; state.catName = null;
        buildSidebar();
        showSearchBanner(term);
        loadServices(true);
    }

    function showSearchBanner(term) {
        const b = document.getElementById('searchBanner');
        if (!b) return;
        b.style.display = 'flex';
        b.innerHTML = `<div class="search-banner"><span>🔍 نتایج جستجو برای <strong>«${escapeHtml(term)}»</strong></span><button class="btn-clear-search" onclick="clearSearch()">✕ پاک کردن</button></div>`;
    }

    function clearSearchBanner() {
        const b = document.getElementById('searchBanner');
        if (b) b.style.display = 'none';
    }

    function clearSearch() {
        state.mode = 'all'; state.searchTerm = ''; state.catName = null;
        const input = document.getElementById('searchInput');
        if (input) input.value = '';
        clearSearchBanner();
        buildSidebar();
        loadServices(true);
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ════════════════════════════════════════════════════════════════════
    //  SERVICE LIST — real server-side pagination via /api/services
    // ════════════════════════════════════════════════════════════════════
    function updateHeader() {
        const titleEl = document.getElementById('contentTitle');
        const subEl = document.getElementById('contentSub');
        if (state.mode === 'top') {
            if (titleEl) titleEl.textContent = '⭐ خدمات پرکاربرد';
            if (subEl) subEl.textContent = 'محبوب‌ترین خدمات کافی‌نت';

        } else if (state.mode === 'search') {

            if (subEl) subEl.textContent = `${toPersianNum(state.total)} خدمت فعال`;
        }
    }

async function loadServices(reset) {
    if (reset) {
        state.cursor = null;
        state.hasMore = true;
        state.total = 0;
        const grid = document.getElementById('serviceGrid');
        if (grid) grid.innerHTML = '';
        document.getElementById('endMessage').style.display = 'none';
        // Reset loader state for fresh load
        const loader = document.getElementById('scrollLoader');
        if (loader) {
            loader.style.display = 'flex';
            loader.innerHTML = `<div class="spinner"></div> در حال بارگذاری...`;
        }
    }
    if (state.mode === 'top') return loadFeatured();
    if (state.loading || !state.hasMore) return;

    state.loading = true;
    const loader = document.getElementById('scrollLoader');
    if (loader) {
        loader.style.display = 'flex';
        loader.innerHTML = `<div class="spinner"></div> در حال بارگذاری...`;
    }

    try {
        const params = new URLSearchParams();
        params.set('limit', '25');
        if (state.cursor) params.set('cursor', state.cursor);
        if (state.mode === 'category' && state.catName) params.set('category', state.catName);
        if (state.mode === 'search' && state.searchTerm) params.set('search', state.searchTerm);

        const data = await apiFetch(`/api/services?${params.toString()}`);
        state.total = data.total || 0;
        state.hasMore = !!data.hasMore;
        state.cursor = data.nextCursor || null;
        renderServiceCards(data.items || []);
        updateHeader();

        if (!state.hasMore) {
            document.getElementById('endMessage').style.display = 'block';
            if (loader) loader.style.display = 'none';
        } else {
            document.getElementById('endMessage').style.display = 'none';
            if (loader) {
                loader.style.display = 'flex';
                loader.innerHTML = `⬇️ برای مشاهده بیشتر اسکرول کنید`;
            }
        }

        if (!data.items || !data.items.length) {
            const grid = document.getElementById('serviceGrid');
            if (grid && !grid.children.length) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3>نتیجه‌ای یافت نشد</h3><p>عبارت دیگری را امتحان کنید یا دسته‌بندی را تغییر دهید.</p></div>`;
                document.getElementById('endMessage').style.display = 'none';
                if (loader) loader.style.display = 'none';
            }
        }
    } catch (e) {
        showToast('⚠️ خطا در دریافت خدمات: ' + e.message, 'error');
        // On error, keep loader visible if there might be more data
        if (loader && state.hasMore) {
            loader.style.display = 'flex';
            loader.innerHTML = `⚠️ خطا در بارگذاری — دوباره تلاش کنید`;
        }
    } finally {
        state.loading = false;
        // The loader visibility is now controlled inside the try block
        // We only hide it here if there's genuinely no more data and it's not already handled
        if (!state.hasMore && loader) {
            loader.style.display = 'none';
        }
        // Re-observe the loader after state changes
        if (scrollObserver && loader) {
            scrollObserver.disconnect();
            scrollObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !state.loading && state.hasMore) {
                        loadServices(false);
                    }
                });
            }, { rootMargin: '0px 0px 300px 0px', threshold: 0.1 });
            scrollObserver.observe(loader);
        }
    }
}
async function loadFeatured() {
    state.loading = true;
    const loader = document.getElementById('scrollLoader');
    if (loader) {
        loader.style.display = 'flex';
        loader.innerHTML = `<div class="spinner"></div> در حال بارگذاری...`;
    }
    try {
        const items = await apiFetch('/api/services/featured');
        state.hasMore = false;
        state.total = (items || []).length;
        renderServiceCards(items || []);
        updateHeader();
        document.getElementById('endMessage').style.display = (items && items.length) ? 'block' : 'none';
        if (loader) loader.style.display = 'none';
        if (!items || !items.length) {
            document.getElementById('serviceGrid').innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><h3>هنوز خدمت ویژه‌ای ثبت نشده</h3></div>`;
            document.getElementById('endMessage').style.display = 'none';
        }
    } catch (e) {
        showToast('⚠️ خطا در دریافت خدمات پرکاربرد: ' + e.message, 'error');
        if (loader) loader.style.display = 'none';
    } finally {
        state.loading = false;
    }
}
    function renderServiceCards(items) {
        const grid = document.getElementById('serviceGrid');
        if (!grid) return;

            const cat = s.category || '';
            return `<div class="service-card" onclick="openServicePage('${s.serviceId}')">

                        <div class="service-cats">${cat ? `<span class="service-cat-tag">${escapeHtml(cat)}</span>` : ''}</div>
                        <div class="service-footer">
                            <div class="service-price">${formatPrice(s.price)} <span>تومان</span></div>
                            <button class="btn-request" onclick="event.stopPropagation();startRequest('${s.serviceId}')">ثبت درخواست</button>
                        </div>
                    </div>`;
        }).join('');
        grid.insertAdjacentHTML('beforeend', html);
    }

    // ─── INFINITE SCROLL ───────────────────────────────────────────────────
    // after inserting new cards:
    setupScrollObserver();

    // ════════════════════════════════════════════════════════════════════
    //  SERVICE DETAIL PAGE
    // ════════════════════════════════════════════════════════════════════
    async function openServicePage(id) {
        try {
            const detail = await apiFetch(`/api/services/${encodeURIComponent(id)}`);

            showToast('⚠️ سرویس یافت نشد یا خطا در دریافت اطلاعات.', 'error');
        }
    }
function setupScrollObserver() {
    if (scrollObserver) scrollObserver.disconnect();
    const loader = document.getElementById('scrollLoader');
    if (!loader) return;
    scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !state.loading && state.hasMore) {
                loadServices(false);
            }
        });
    }, { rootMargin: '0px 0px 300px 0px', threshold: 0.1 });
    scrollObserver.observe(loader);
}
    function renderServicePage(detail) {

                <div class="sp-price-row">
                    <div><div class="sp-price">${formatPrice(price)} <span class="sp-price-label">تومان</span></div></div>
                    <button class="btn-sp-request" onclick="startRequest('${detail.serviceId}')">📝 ثبت درخواست</button>
                </div>
            </div>
            ${noticeHTML}

        pageEl.classList.add('active');

    function closeServicePage() {
        const pageEl = document.getElementById('servicePage');
        if (pageEl) pageEl.classList.remove('active');
        const bodyEl = document.getElementById('pageBody');
        if (bodyEl) bodyEl.style.display = '';
        document.title = 'کافی‌نت آنلاین – خدمات اداری و دولتی';
    }

    // ════════════════════════════════════════════════════════════════════
    //  REQUEST FLOW (multi-step form → summary → payment → submit)
    // ════════════════════════════════════════════════════════════════════
    async function startRequest(id) {
        let detail = (currentServiceDetail && currentServiceDetail.serviceId === id) ? currentServiceDetail : serviceCache[id];
        if (!detail) {
            try {
                detail = await apiFetch(`/api/services/${encodeURIComponent(id)}`);
                serviceCache[id] = detail;
            } catch (e) {
                showToast('⚠️ خطا در دریافت اطلاعات سرویس.', 'error');
                return;
            }
        }
        const d = detail.data || {};
        const docs = buildDocsFromDetail(d);
        requestState = {
            service: { id: detail.serviceId, title: detail.serviceTitle, price: d.price || 0 },
            docs,
            step: 0,
            values: {},
            receiptImage: null,
            totalSteps: docs.length + 2
        };
        renderRequestModal();
        document.getElementById('requestOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeRequest(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('requestOverlay').classList.remove('open');
        document.body.style.overflow = '';
    }

    function renderRequestFooter(isSummary, isPayment, step) {
        const hasBack = step > 0;
        if (isPayment) {
            return `${hasBack ? `<button class="btn-secondary" onclick="prevStep()">→ بازگشت</button>` : ''}
                    <button class="btn-primary" id="submitBtn" onclick="submitRequest()">✅ ثبت نهایی درخواست</button>`;
        }
        if (isSummary) {
            return `${hasBack ? `<button class="btn-secondary" onclick="prevStep()">→ ویرایش</button>` : ''}
                    <button class="btn-primary" onclick="nextStep()">پرداخت ←</button>`;
        }
        return `${hasBack ? `<button class="btn-secondary" onclick="prevStep()">→ قبلی</button>` : ''}
                <button class="btn-primary" onclick="nextStep()">بعدی ←</button>`;
    }

    function renderRequestModal() {
        const { service, docs, step } = requestState;
        const modal = document.getElementById('requestModal');
        if (!modal) return;

        const isSummary = step === docs.length;
        const isPayment = step === docs.length + 1;

        const stepLabels = docs.map((d, i) => docs.length <= 3 ? d.title.slice(0, 8) + '…' : `مدرک ${toPersianNum(i + 1)}`);
        stepLabels.push('تأیید', 'پرداخت');

        const stepsHTML = stepLabels.map((label, i) => {
            const cls = i < step ? 'done' : i === step ? 'active' : '';
            return `<div class="flow-step ${cls}"><div class="step-circle">${i < step ? '✓' : toPersianNum(i + 1)}</div><div class="step-label">${escapeHtml(label)}</div></div>`;
        }).join('');

        let bodyHTML;
        if (isPayment) bodyHTML = renderPaymentStep();
        else if (isSummary) bodyHTML = renderSummary();
        else bodyHTML = renderDocStep(step);

        modal.innerHTML = `
            <div class="modal-header">
                <div class="modal-header-info">
                    <h2>📝 ثبت درخواست</h2>
                    <div style="font-size:13px;color:var(--text3);margin-top:4px">${escapeHtml(service.title)}</div>
                </div>
                <button class="modal-close" onclick="closeRequest()">✕</button>
            </div>
            <div class="flow-progress"><div class="flow-steps">${stepsHTML}</div></div>
            <div class="modal-body" id="requestBody">${bodyHTML}</div>
            <div class="modal-footer" id="requestFooter">${renderRequestFooter(isSummary, isPayment, step)}</div>
        `;

        // Async post-render population for province/city selects
        if (!isSummary && !isPayment) {
            const doc = docs[step];
            if (doc.type === 'city') fillCityOptions(doc);
        }
    }

    async function fillCityOptions(doc) {
        const provinceValue = requestState.values['استان'] || requestState.values['استان محل زندگی'] || '';
        const citySelect = document.getElementById('docSelect');
        if (!citySelect) return;
        let cities = [];
        if (provinceValue) {
            try {
                if (!CITY_CACHE[provinceValue]) {
                    CITY_CACHE[provinceValue] = await apiFetch(`/api/cities/${encodeURIComponent(provinceValue)}`);
                }
                cities = CITY_CACHE[provinceValue] || [];
            } catch (e) { cities = []; }
        }
        const placeholder = !cities.length ? 'ابتدا استان را انتخاب کنید' : 'انتخاب شهر...';
        citySelect.innerHTML = `<option value="">${placeholder}</option>` + cities.map(c =>
            `<option value="${escapeHtml(c)}" ${requestState.values[doc.title] === c ? 'selected' : ''}>${escapeHtml(c)}</option>`
        ).join('');
        citySelect.disabled = !cities.length;
    }

    function renderDocStep(step) {
        const doc = requestState.docs[step];
        const val = requestState.values[doc.title] || '';
        const isRequired = doc.isRequired !== false;
        const requiredMark = isRequired ? '<span class="field-required">*</span>' : '';
        let fieldHTML = '';

        switch (doc.type) {
            case 'checkbox': {
                const opts = doc.options || [];
                const selected = val ? (Array.isArray(val) ? val : val.split(',')) : [];
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <div class="field-options" id="checkboxGroup_${step}">
                            ${opts.map((opt, idx) => `<div class="option-item">
                                <input type="checkbox" id="chk_${step}_${idx}" value="${escapeHtml(opt)}" ${selected.includes(opt) ? 'checked' : ''} onchange="updateCheckboxValue(${step})">
                                <label for="chk_${step}_${idx}">${escapeHtml(opt)}</label></div>`).join('')}
                        </div>
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            }
            case 'radio': {
                const opts = doc.options || [];
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <div class="field-options">
                            ${opts.map((opt, idx) => `<div class="option-item">
                                <input type="radio" name="radio_${step}" id="radio_${step}_${idx}" value="${escapeHtml(opt)}" ${val === opt ? 'checked' : ''} onchange="updateRadioValue(${step}, '${escapeHtml(opt)}')">
                                <label for="radio_${step}_${idx}">${escapeHtml(opt)}</label></div>`).join('')}
                        </div>
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            }
            case 'select': {
                const opts = doc.options || [];
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <select class="field-select" id="docSelect" onchange="selectOnChange(this)">
                            <option value="">انتخاب کنید...</option>
                            ${opts.map(opt => `<option value="${escapeHtml(opt)}" ${val === opt ? 'selected' : ''}>${escapeHtml(opt)}</option>`).join('')}
                        </select>
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            }
            case 'boolean':
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <div class="field-boolean">
                            <label><input type="radio" name="boolean_${step}" value="true" ${val === true || val === 'true' ? 'checked' : ''} onchange="updateBooleanValue(${step}, true)"> بله</label>
                            <label><input type="radio" name="boolean_${step}" value="false" ${val === false || val === 'false' ? 'checked' : ''} onchange="updateBooleanValue(${step}, false)"> خیر</label>
                        </div>
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            case 'province':
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <select class="field-select" id="docSelect" onchange="provinceOnChange(this, ${step})">
                            <option value="">انتخاب استان...</option>
                            ${PROVINCES.map(p => `<option value="${escapeHtml(p)}" ${val === p ? 'selected' : ''}>${escapeHtml(p)}</option>`).join('')}
                        </select>
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            case 'city':
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <select class="field-select" id="docSelect" disabled onchange="cityOnChange(this)">
                            <option value="">در حال بارگذاری...</option>
                        </select>
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            case 'date':
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <input class="field-input" id="docInput" type="date" value="${val}" oninput="clearFieldError()" onchange="dateOnChange(this)">
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            case 'file':
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <label class="field-upload" onclick="document.getElementById('fileInput_${step}').click()">
                            <input type="file" id="fileInput_${step}" accept="image/*,.pdf,.doc,.docx" onchange="handleFileUpload(this, ${step})">
                            <div class="upload-icon">📁</div>
                            <div class="upload-text">کلیک کنید یا فایل را اینجا بکشید</div>
                            ${val ? `<img src="${val}" class="upload-preview">` : ''}
                        </label>
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            case 'number':
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <input class="field-input" id="docInput" type="number" placeholder="${escapeHtml(doc.placeholder || '')}" value="${val}"
                            oninput="clearFieldError()" onkeydown="if(event.key==='Enter')nextStep()"
                            ${doc.validationRules?.min ? `min="${doc.validationRules.min}"` : ''}
                            ${doc.validationRules?.max ? `max="${doc.validationRules.max}"` : ''}>
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            case 'textarea':
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <textarea class="field-input" id="docInput" placeholder="${escapeHtml(doc.placeholder || '')}" rows="4" oninput="clearFieldError()">${escapeHtml(val)}</textarea>
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
                break;
            default: // text, nationalCode, licensePlate, ...
                fieldHTML = `<div class="field-group">
                        <div class="field-label">${typeIcon(doc.type)} ${escapeHtml(doc.title)} ${requiredMark}</div>
                        <input class="field-input" id="docInput" type="text" placeholder="${escapeHtml(doc.placeholder || '')}" value="${escapeHtml(val)}"
                            oninput="clearFieldError()" onkeydown="if(event.key==='Enter')nextStep()">
                        <div class="field-error" id="fieldError" style="display:none"></div></div>`;
        }
        return fieldHTML;
    }

    function updateCheckboxValue(step) {
        const doc = requestState.docs[step];
        const container = document.getElementById(`checkboxGroup_${step}`);
        if (!container) return;
        const selected = [];
        container.querySelectorAll('input[type="checkbox"]').forEach(cb => { if (cb.checked) selected.push(cb.value); });
        requestState.values[doc.title] = selected;
        clearFieldError();
    }
    function updateRadioValue(step, value) { requestState.values[requestState.docs[step].title] = value; clearFieldError(); }
    function selectOnChange(el) { requestState.values[requestState.docs[requestState.step].title] = el.value; clearFieldError(); }
    function updateBooleanValue(step, value) { requestState.values[requestState.docs[step].title] = value; clearFieldError(); }
    function provinceOnChange(el, step) { requestState.values[requestState.docs[step].title] = el.value; clearFieldError(); }
    function cityOnChange(el) { requestState.values[requestState.docs[requestState.step].title] = el.value; clearFieldError(); }
    function dateOnChange(el) { requestState.values[requestState.docs[requestState.step].title] = el.value; clearFieldError(); }

    function clearFieldError() {
        const el = document.getElementById('fieldError');
        if (el) { el.style.display = 'none'; el.textContent = ''; }
        const inp = document.getElementById('docInput');
        if (inp) inp.classList.remove('error');
    }
    function showFieldError(msg) {
        const el = document.getElementById('fieldError');
        if (el) { el.style.display = 'block'; el.textContent = '⚠️ ' + msg; }
        const inp = document.getElementById('docInput');
        if (inp) inp.classList.add('error');
    }

    function prevStep() {
        if (requestState.step > 0) { requestState.step--; renderRequestModal(); }
    }

    function nextStep() {
        const { docs, step } = requestState;

        if (step === docs.length + 1) { // payment step
            if (!requestState.receiptImage) { showFieldError('لطفاً تصویر رسید پرداخت را آپلود کنید.'); return; }
            requestState.step++; renderRequestModal(); return;
        }
        if (step === docs.length) { // summary step
            requestState.step++; renderRequestModal(); return;
        }

        const doc = docs[step];
        const isRequired = doc.isRequired !== false;
        let val = '';

        switch (doc.type) {
            case 'checkbox':
                val = requestState.values[doc.title];
                if (isRequired && (!val || !Array.isArray(val) || !val.length)) { showFieldError('لطفاً حداقل یک گزینه را انتخاب کنید.'); return; }
                break;
            case 'radio': case 'boolean': case 'province':
                val = requestState.values[doc.title];
                if (isRequired && !val) { showFieldError('لطفاً یک گزینه را انتخاب کنید.'); return; }
                break;
            case 'city': {
                const sel = document.getElementById('docSelect');
                val = sel ? sel.value : '';
                if (isRequired && !val) { showFieldError('لطفاً یک شهر را انتخاب کنید.'); return; }
                requestState.values[doc.title] = val;
                break;
            }
            case 'select': {
                const sel = document.getElementById('docSelect');
                val = sel ? sel.value : '';
                if (isRequired && !val) { showFieldError('لطفاً یک گزینه را انتخاب کنید.'); return; }
                requestState.values[doc.title] = val;
                break;
            }
            case 'date': {
                const inp = document.getElementById('docInput');
                val = inp ? inp.value : '';
                if (isRequired && !val) { showFieldError('لطفاً تاریخ را وارد کنید.'); return; }
                requestState.values[doc.title] = val;
                break;
            }

    // ─── FILE / IMAGE HANDLING ─────────────────────────────────────────────
    function compressImage(file, maxWidth = 800, maxHeight = 800, quality = 0.7) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                    if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    function handleReceiptUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const apply = (dataUrl) => {
            requestState.receiptImage = dataUrl;
            const wrap = document.getElementById('receiptPreviewWrap');
            if (wrap) wrap.innerHTML = `<img src="${dataUrl}" class="upload-preview">`;
            clearFieldError();
        };
        if (file.size > 1024 * 1024) {
            compressImage(file, 800, 800, 0.7).then(apply).catch(() => {
                const reader = new FileReader();
                reader.onload = e => apply(e.target.result);
                reader.readAsDataURL(file);
            });
        } else {
            const reader = new FileReader();
            reader.onload = e => apply(e.target.result);
            reader.readAsDataURL(file);
        }
    }

    function handleFileUpload(input, step) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { showFieldError('حجم فایل باید کمتر از ۵ مگابایت باشد.'); return; }
        const doc = requestState.docs[step];
        const apply = (dataUrl) => {
            requestState.values[doc.title] = dataUrl;
            const upload = document.querySelector('.field-upload');
            let preview = document.querySelector('.upload-preview');
            if (preview) preview.src = dataUrl;
            else if (upload) {
                const img = document.createElement('img');
                img.src = dataUrl; img.className = 'upload-preview';
                upload.appendChild(img);
            }
            clearFieldError();
        };
        if (file.type.startsWith('image/')) {
            compressImage(file, 800, 800, 0.7).then(apply).catch(() => {
                const reader = new FileReader();
                reader.onload = e => apply(e.target.result);
                reader.readAsDataURL(file);
            });
        } else {
            const reader = new FileReader();
            reader.onload = e => { apply(e.target.result); showToast('فایل با موفقیت آپلود شد', 'success'); };
            reader.readAsDataURL(file);
        }
    }

    // ─── SUBMIT ─────────────────────────────────────────────────────────────
    function submitRequest() {
        if (!currentUser || !localStorage.getItem('cafenet_token')) {
            savePendingRequest();
            showToast('⚠️ لطفاً ابتدا وارد حساب کاربری خود شوید', '');
            authState.callback = 'submitAfterLogin';
            openAuth();
            return;
        }
        performSubmitRequest();
    }

    function savePendingRequest() {
        const { service, docs, values, receiptImage, step } = requestState;
        sessionStorage.setItem('pendingRequest', JSON.stringify({
            serviceId: service.id,
            documents: docs.map(d => ({ title: d.title, value: Array.isArray(values[d.title]) ? values[d.title].join('، ') : (values[d.title] || '') })),
            receiptImage: receiptImage || null,
            step: step,
        }));
    }

    async function performSubmitRequest() {
        const { service, docs, values, receiptImage } = requestState;
        if (!receiptImage) { showToast('تصویر پرداختی را بارگذاری کنید', 'error'); return; }

        const documents = docs.map(d => ({
            title: d.title,
            value: Array.isArray(values[d.title]) ? values[d.title].join('، ') : String(values[d.title] ?? '')
        }));

        const submitBtn = document.getElementById('submitBtn');
        if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'در حال ارسال...'; }

        try {
            const result = await apiFetch('/api/requests', {
                method: 'POST',
                body: JSON.stringify({
                    serviceId: service.id,
                    serviceTitle: service.title,
                    price: service.price,
                    documents,
                    receiptImage
                })
            });
            showToast('✅ درخواست شما با موفقیت ثبت شد', 'success');
            closeRequest();
            closeServicePage();
            clearSearch();
        } catch (e) {
            showToast('⚠️ خطا در ثبت درخواست: ' + e.message, 'error');
            if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '✅ ثبت نهایی درخواست'; }
        }
    }

    async function checkPendingRequest() {
        const pending = sessionStorage.getItem('pendingRequest');
        if (!pending) return;
        try {
            const data = JSON.parse(pending);
            const detail = serviceCache[data.serviceId] || await apiFetch(`/api/services/${encodeURIComponent(data.serviceId)}`);
            serviceCache[data.serviceId] = detail;
            const docs = buildDocsFromDetail(detail.data || {});
            requestState = {
                service: { id: detail.serviceId, title: detail.serviceTitle, price: (detail.data || {}).price || 0 },
                docs, step: data.step || 0, values: {}, receiptImage: data.receiptImage || null,
                totalSteps: docs.length + 2
            };
            (data.documents || []).forEach(doc => { requestState.values[doc.title] = doc.value; });
            renderRequestModal();
            document.getElementById('requestOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        } catch (e) {
            // ignore, pending request could not be restored
        } finally {
            sessionStorage.removeItem('pendingRequest');
        }
    }

    async function authNextPhone() {
        const phoneInput = document.getElementById('phoneInput');
        const phone = phoneInput ? phoneInput.value.trim() : '';
        if (!/^09[0-9]{9}$/.test(phone)) {
            const e = document.getElementById('authError');
            if (e) { e.style.display = 'block'; e.textContent = '⚠️ شماره موبایل باید ۱۱ رقم و با 09 شروع شود.'; }
            return;
        }
        authState.phone = phone;
        try {
            await apiFetch('/api/auth/otp/send', { method: 'POST', body: JSON.stringify({ phone }) });
            authState.step = 'otp';
            renderAuthModal();
        } catch (e) {
            const el = document.getElementById('authError');
            if (el) { el.style.display = 'block'; el.textContent = '⚠️ ' + e.message; }
        }
    }

    function getOtpValue() {
        return [0,1,2,3,4].map(i => (document.getElementById('otp' + i)?.value || '')).join('');
    }
    function otpInput(el, i) {
        el.value = el.value.replace(/[^0-9]/g, '').slice(-1);
        if (el.value && i < 4) document.getElementById('otp' + (i + 1))?.focus();
        if (getOtpValue().length === 5) authVerifyOtp();
    }
    function otpKey(e, i) {
        if (e.key === 'Backspace' && !e.target.value && i > 0) document.getElementById('otp' + (i - 1))?.focus();
    }
    function startOtpTimer() {
        authState.seconds = 60;
        if (authState.timer) clearInterval(authState.timer);
        authState.timer = setInterval(() => {
            authState.seconds--;
            const el = document.getElementById('otpTimer');
            if (el) el.textContent = toPersianNum(authState.seconds);
            if (authState.seconds <= 0) {
                clearInterval(authState.timer);
                const txt = document.getElementById('otpTimerText');
                const btn = document.getElementById('otpResendBtn');
                if (txt) txt.style.display = 'none';
                if (btn) btn.style.display = 'inline';
            }
        }, 1000);
    }
    async function authResendOtp() {
        try {
            await apiFetch('/api/auth/otp/send', { method: 'POST', body: JSON.stringify({ phone: authState.phone }) });
            document.getElementById('otpTimerText').style.display = '';
            document.getElementById('otpResendBtn').style.display = 'none';
            startOtpTimer();
            showToast('کد جدید ارسال شد', 'success');
        } catch (e) { showToast('⚠️ ' + e.message, 'error'); }
    }

    async function authVerifyOtp() {
        const otp = getOtpValue();
        if (otp.length < 5) {
            const e = document.getElementById('otpError');
            if (e) { e.style.display = 'block'; e.textContent = '⚠️ کد ۵ رقمی را کامل وارد کنید.'; }
            return;
        }
        try {
            const result = await apiFetch('/api/auth/otp/verify', { method: 'POST', body: JSON.stringify({ phone: authState.phone, otp }) });
            loginSuccess(result.user, result.token);
        } catch (e) {
            const el = document.getElementById('otpError');
            if (el) { el.style.display = 'block'; el.textContent = '⚠️ ' + e.message; }
        }
    }

    function getTelegramUser() {
        try {

                const initData = window.Telegram.WebApp.initData;
                if (user) return { user, initData };
            }
        } catch (e) {}
        return null;
    }

    async function tryTelegramAutoLogin() {
        if (currentUser) return; // already logged in
        const tgData = getTelegramUser();
        if (!tgData) return;
        try {
            const result = await apiFetch('/api/auth/telegram-login', {
                method: 'POST',
                body: JSON.stringify({ initData: tgData.initData || '', user: tgData.user })
            });
            loginSuccess(result.user, result.token);
            if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.expand();
        } catch (e) {
            // silent — user can still log in manually via phone/OTP
        }
    }

// 2. Lazy load images
const lazyLoadImages = () => {
    const images = document.querySelectorAll('img[data-src]');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                img.src = img.dataset.src;
                img.removeAttribute('data-src');
                observer.unobserve(img);
            }
        });
    });
    images.forEach(img => observer.observe(img));
};
